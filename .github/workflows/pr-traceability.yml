name: PR Traceability

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  requirement-traceability:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body has requirement traceability
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").trim();
            const hasReq = /REQ-\d{3}/.test(body);
            const hasNA = /\bN\/A\b/i.test(body);
            if (!hasReq && !hasNA) {
              core.setFailed("PR body must include at least one REQ-xxx or explicit N/A in Requirement Traceability section.");
            }
