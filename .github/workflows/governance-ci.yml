name: Governance CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  governance-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Validate governance rules
        run: scripts/governance-check.sh

      - name: Validate memory integrity
        run: scripts/memory-integrity-check.sh

      - name: Validate traceability
        run: scripts/traceability-check.sh

      - name: Validate context budget
        run: scripts/context-budget-check.sh

      - name: Validate code constraints
        run: scripts/code-constraints-check.sh
