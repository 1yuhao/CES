name: Feature request
description: Propose a new capability with requirement traceability.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are we solving?
      placeholder: Describe the user or engineering pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built?
    validations:
      required: true
  - type: input
    id: requirement_ids
    attributes:
      label: Requirement IDs
      description: Link to REQ IDs from memory/warm/requirements.md
      placeholder: "REQ-001, REQ-00X"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true to call this done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk level
      options:
        - L0
        - L1
        - L2
        - L3
        - L4
    validations:
      required: true
